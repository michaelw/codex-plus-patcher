name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
      - run: npm ci
      - run: npm test
      - run: npm run check
      - run: npm run check:package
      - run: npm --cache /private/tmp/codex-plus-npm-cache pack --dry-run --json
