name: Backfill npm package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish"
        required: true
        type: choice
        options:
          - "0.12.0"
          - "0.12.1"
          - "0.12.2"
          - "0.12.3"
      ref:
        description: "Exact release commit SHA"
        required: true
        type: string
      dist_tag:
        description: "npm dist-tag"
        required: true
        type: string
        default: "latest"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate release commit
    runs-on: macos-latest
    steps:
      - name: Checkout current guard scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: guard

      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          path: package

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"

      - name: Validate requested version and ref
        working-directory: package
        env:
          REQUESTED_REF: ${{ inputs.ref }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          actual_ref="$(git rev-parse HEAD)"
          if [ "$actual_ref" != "$REQUESTED_REF" ]; then
            echo "Checked out $actual_ref, expected $REQUESTED_REF" >&2
            exit 1
          fi

          case "$REQUESTED_VERSION:$REQUESTED_REF" in
            "0.12.0:4149ac288fcf70a136346761783cd491e9580c6a") ;;
            "0.12.1:21616ed3b173d3fa998d77b43a28814386bdc9c7") ;;
            "0.12.2:5651d2e810110660bf19db425ec23d4df5fb727e") ;;
            "0.12.3:7184e82311cc6c272609a13c83e3f7592a62d565") ;;
            *)
              echo "Version/ref pair is not an approved 0.12.x release backfill target" >&2
              exit 1
              ;;
          esac

          node -e 'const pkg = require("./package.json"); if (pkg.version !== process.env.REQUESTED_VERSION) { throw new Error(`package.json version ${pkg.version} does not match ${process.env.REQUESTED_VERSION}`); }'

      - name: Install dependencies
        working-directory: package
        run: npm ci

      - name: Run tests
        working-directory: package
        run: npm test

      - name: Run syntax check
        working-directory: package
        run: npm run check

      - name: Check package contents
        working-directory: package
        run: node ../guard/scripts/check-package-contents.js

  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout current guard scripts
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: guard

      - name: Checkout release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref }}
          path: package

      - name: Set up Node
        uses: actions/setup-node@v7
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Validate requested version and ref
        working-directory: package
        env:
          REQUESTED_REF: ${{ inputs.ref }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          actual_ref="$(git rev-parse HEAD)"
          if [ "$actual_ref" != "$REQUESTED_REF" ]; then
            echo "Checked out $actual_ref, expected $REQUESTED_REF" >&2
            exit 1
          fi

          case "$REQUESTED_VERSION:$REQUESTED_REF" in
            "0.12.0:4149ac288fcf70a136346761783cd491e9580c6a") ;;
            "0.12.1:21616ed3b173d3fa998d77b43a28814386bdc9c7") ;;
            "0.12.2:5651d2e810110660bf19db425ec23d4df5fb727e") ;;
            "0.12.3:7184e82311cc6c272609a13c83e3f7592a62d565") ;;
            *)
              echo "Version/ref pair is not an approved 0.12.x release backfill target" >&2
              exit 1
              ;;
          esac

          node -e 'const pkg = require("./package.json"); if (pkg.version !== process.env.REQUESTED_VERSION) { throw new Error(`package.json version ${pkg.version} does not match ${process.env.REQUESTED_VERSION}`); }'

      - name: Install dependencies
        working-directory: package
        run: npm ci

      - name: Run syntax check
        working-directory: package
        run: npm run check

      - name: Check package contents
        working-directory: package
        run: node ../guard/scripts/check-package-contents.js

      - name: Ensure npm version is unpublished
        env:
          REQUESTED_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if npm view "codex-plus-patcher@$REQUESTED_VERSION" version >/tmp/codex-plus-patcher-version 2>/dev/null; then
            echo "codex-plus-patcher@$REQUESTED_VERSION is already published:" >&2
            cat /tmp/codex-plus-patcher-version >&2
            exit 1
          fi

      - name: Publish package
        working-directory: package
        env:
          DIST_TAG: ${{ inputs.dist_tag }}
        run: npm publish --tag "$DIST_TAG"
